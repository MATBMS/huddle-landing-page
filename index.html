<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32x32.png">
  <link rel="stylesheet" href="./styles/main.css">
  <script src="./script.js" defer></script>

  <title>Huddle landing page</title>
</head>
<body>

  <div class="page">
    <header class="page__header">
      <img class="page__logo" src="./images/logo.svg" alt="Huddle" width="120">
    </header>

    <main class="intro">
      <img class="intro__illustration" src="./images/illustration-mockups.svg"
        alt="People connecting and chatting on the Huddle community platform">

      <div class="intro__content">
        <div class="intro__text">
          <h1 class="text-preset-2">Build The Community Your Fans Will Love</h1>
          <p class="text-preset-5">
            Huddle re-imagines the way we build communities. You have a voice,
            but so does your audience. Create connections with your users as you
            engage in genuine discussion.
          </p>
        </div>

        <button class="button" type="button">Register</button>
      </div>
    </main>

    <footer class="page__footer">
      <ul class="social-links">
        <li>
          <a class="social-links__link" href="https://www.facebook.com/" target="_blank" rel="noopener noreferrer" aria-label="Huddle on Facebook (opens in a new tab)">
            <svg class="social-links__icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path fill="currentColor" d="M13.5 21v-8h2.7l.4-3.1h-3.1V7.9c0-.9.25-1.5 1.55-1.5H17V3.6c-.3 0-1.3-.1-2.45-.1-2.45 0-4.05 1.5-4.05 4.2v2.2H7.8V13h2.7v8h3z"/>
            </svg>
          </a>
        </li>
        <li>
          <a class="social-links__link" href="https://x.com/" target="_blank" rel="noopener noreferrer" aria-label="Huddle on X (formerly Twitter) (opens in a new tab)">
            <svg class="social-links__icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path fill="currentColor" d="M21.5 7.1c-.7.3-1.45.5-2.2.6.8-.5 1.4-1.25 1.7-2.15-.75.45-1.55.75-2.45.95a3.85 3.85 0 0 0-6.55 3.5A10.9 10.9 0 0 1 4 5.95a3.85 3.85 0 0 0 1.2 5.15c-.6 0-1.2-.2-1.7-.45v.05c0 1.85 1.3 3.4 3.1 3.75-.55.15-1.15.2-1.75.05a3.85 3.85 0 0 0 3.6 2.7A7.75 7.75 0 0 1 2.5 18.85a10.9 10.9 0 0 0 5.95 1.75c7.15 0 11.05-5.9 11.05-11.05v-.5c.75-.55 1.4-1.25 1.95-2.05z"/>
            </svg>
          </a>
        </li>
        <li>
          <a class="social-links__link" href="https://www.instagram.com/" target="_blank" rel="noopener noreferrer" aria-label="Huddle on Instagram (opens in a new tab)">
            <svg class="social-links__icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path fill="currentColor" d="M12 7.3a4.7 4.7 0 1 0 0 9.4 4.7 4.7 0 0 0 0-9.4zm0 7.75a3.05 3.05 0 1 1 0-6.1 3.05 3.05 0 0 1 0 6.1zm6-7.95a1.1 1.1 0 1 1-2.2 0 1.1 1.1 0 0 1 2.2 0zM21.1 8.3c-.07-1.47-.4-2.77-1.48-3.85-1.07-1.07-2.37-1.4-3.84-1.48-1.5-.08-6.05-.08-7.56 0-1.46.07-2.76.4-3.84 1.48C3.31 5.52 2.98 6.82 2.9 8.29c-.08 1.5-.08 6.06 0 7.56.07 1.47.4 2.77 1.48 3.85 1.08 1.07 2.38 1.4 3.84 1.48 1.5.08 6.05.08 7.56 0 1.47-.07 2.77-.4 3.84-1.48 1.07-1.08 1.4-2.38 1.48-3.85.08-1.5.08-6.05 0-7.55zM19.14 17.5a3.1 3.1 0 0 1-1.74 1.74c-1.2.48-4.06.37-5.4.37-1.34 0-4.2.1-5.4-.37a3.1 3.1 0 0 1-1.74-1.74c-.48-1.2-.37-4.06-.37-5.4 0-1.34-.1-4.2.37-5.4A3.1 3.1 0 0 1 6.6 4.96c1.2-.48 4.06-.37 5.4-.37 1.34 0 4.2-.1 5.4.37a3.1 3.1 0 0 1 1.74 1.74c.48 1.2.37 4.06.37 5.4 0 1.34.1 4.2-.37 5.4z"/>
            </svg>
          </a>
        </li>
      </ul>
    </footer>
  </div>

  <div class="notification" role="status" aria-live="polite">
    <p class="notification__text"></p>
  </div>

</body>
</html>
